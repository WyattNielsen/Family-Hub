version: '3.8'

services:
  familyhub:
    build: .
    container_name: family-hub
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./data/photos:/app/backend/data/photos
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      # ── Database ──
      DB_PATH: /data/familyhub.db

      # ── Timezone ──
      TZ: America/New_York

      # ── go2rtc (camera proxy) ──
      GO2RTC_URL: http://host.docker.internal:1984

  go2rtc:
    image: alexxit/go2rtc
    container_name: go2rtc
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml

